name: Test

# Hard gate: type-check + the Vitest unit suite must pass on every PR and on
# pushes to main. The suite is pure-logic over src/lib (no DOM), so it is fast
# and deterministic. The production build stays gated separately by deploy.yml.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Matches deploy.yml: react-simple-maps@1.x peer-pins react@^16 while the
        # app runs react@18, so npm 7+ needs --legacy-peer-deps.
        run: npm ci --legacy-peer-deps

      - name: Type-check
        # Root tsconfig.json is a solution file (files: [] + project references),
        # so a bare `tsc --noEmit` compiles ZERO files and always passes. Point at
        # the app project (include: ["src"]) so the check actually covers the app
        # source AND this suite's *.test.ts files.
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Unit tests
        run: npm test
