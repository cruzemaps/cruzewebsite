name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        # react-simple-maps@1.x declares peer react@^16 while the project runs on
        # react@18 — npm 7+ strictly enforces this and fails. Use legacy
        # resolution so CI matches local install behavior. Same flag should be
        # used locally if you ever delete node_modules and start fresh.
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          # Vite inlines VITE_* at build time. Add a secret in repo Settings →
          # Secrets and variables → Actions to enable each integration. Missing
          # secrets resolve to "" and the code falls back to safe placeholders.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_CALCOM_USER: ${{ secrets.VITE_CALCOM_USER }}
          VITE_DATAROOM_PASSWORD: ${{ secrets.VITE_DATAROOM_PASSWORD }}
          VITE_DATAROOM_URL: ${{ secrets.VITE_DATAROOM_URL }}
          VITE_FRAME_ANALYZE_URL: ${{ secrets.VITE_FRAME_ANALYZE_URL }}
        run: npm run build


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
