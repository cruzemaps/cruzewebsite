<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />

    <title>Cruze | Dissolve Traffic, Not Just Avoid It</title>
    <meta name="description" content="Cruze transforms every smartphone into an active traffic actuator. Our swarm intelligence coordinates driver speeds to dissolve phantom jams—saving fuel, time, and lives." />
    <meta name="author" content="Cruzemaps" />
    <link rel="canonical" href="https://cruzemaps.com" />
    <meta name="theme-color" content="#0B0E14" />

    <meta property="og:title" content="Cruze | Dissolve Traffic, Not Just Avoid It" />
    <meta property="og:description" content="Revolutionary navigation that actively dissolves traffic jams using swarm intelligence and physics-informed AI." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cruzemaps.com" />
    <meta property="og:image" content="https://cruzemaps.com/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://cruzemaps.com/og-default.png" />

    <!-- Default Organization JSON-LD; per-route SEO replaces/augments this -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Cruzemaps",
      "url": "https://cruzemaps.com",
      "logo": "https://cruzemaps.com/logo.png",
      "description": "Cruze coordinates driver speeds with swarm intelligence to dissolve phantom traffic jams."
    }
    </script>

    <!-- SPA fallback for legacy GH-Pages-style 404 redirects (kept for safety) -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body style="background-color: hsl(222, 47%, 6%);">
    <div id="root"></div>
    <noscript>
      <div style="padding:2rem;color:#fff;font-family:sans-serif;max-width:600px;margin:0 auto">
        <h1>Cruze requires JavaScript</h1>
        <p>Cruze coordinates driver speeds with swarm intelligence and physics-informed AI to dissolve phantom traffic jams. Please enable JavaScript to use the full app, or visit <a href="/for-fleets" style="color:#00F2FF">/for-fleets</a> or <a href="/for-cities" style="color:#00F2FF">/for-cities</a> for an introduction.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
